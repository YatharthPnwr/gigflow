version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: gigflow-backend
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: gigflow-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./Frontend/.env
    restart: unless-stopped
